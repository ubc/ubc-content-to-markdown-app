name: Build desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run desktop:build -- --mac dmg zip --${{ matrix.arch }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - run: gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
